<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>洛阳龙门石窟数字遗产交互系统 - 增强重构版</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

  <!-- MediaPipe 库 -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body { margin: 0; background: #000406; color: white; overflow: hidden; font-family: 'Inter', sans-serif; cursor: crosshair; }
    canvas { display: block; }
    .ui-overlay { pointer-events: none; }
    .ui-interact { pointer-events: auto; }
    .glass-panel { background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .scanline { background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,255,204,0.02) 50%); background-size: 100% 4px; }
    .custom-loader { border: 2px solid rgba(0,255,204,0.1); border-top: 2px solid #00ffcc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #sidebar { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .ok-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: #00ffcc; width: 0%; transition: width 0.1s linear; box-shadow: 0 0 10px #00ffcc; }

    /* 圆形进度条样式 */
    .circular-progress { position: absolute; bottom: 10px; left: 10px; width: 40px; height: 40px; transform: rotate(-90deg); filter: drop-shadow(0 0 5px #00ffcc); }
    .circular-progress circle { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
    .bg-circle { stroke: rgba(255,255,255,0.1); }
    .fg-circle { stroke: #00ffcc; stroke-dasharray: 100; stroke-dashoffset: 100; }

    /* 控制面板的 range 样式微调 */
    input[type="range"] { width: 100%; accent-color: #00ffcc; }
  </style>
</head>

<body>
  <div id="canvas-container" class="fixed inset-0 z-0"></div>
  <div class="fixed inset-0 pointer-events-none scanline z-10 opacity-30"></div>

  <div class="ui-overlay fixed inset-0 z-20 p-12 flex flex-col justify-between">
    <header class="flex justify-between items-start">
      <div>
        <div class="w-12 h-0.5 bg-yellow-500 mb-4"></div>
        <h1 class="text-3xl font-extralight tracking-[0.5em] mb-2 uppercase">洛阳龙门石窟</h1>
        <h2 class="text-lg font-light tracking-[0.2em] text-white/40">伊水之畔，千龛万像，刻入时间的光。</h2>
      </div>

      <div class="flex items-center gap-3 pointer-events-auto">
        <button id="auto-btn" onclick="toggleAutoCruise()" class="ui-interact glass-panel px-4 py-3 rounded-full hover:bg-white/10 transition-all text-[10px] tracking-widest uppercase text-cyan-300">
          自动巡航
        </button>

        <button id="kiosk-btn" onclick="toggleKioskMode()" class="ui-interact glass-panel px-4 py-3 rounded-full hover:bg-white/10 transition-all text-[10px] tracking-widest uppercase text-yellow-300">
          沉浸模式
        </button>

        <button onclick="toggleFullScreen()" class="ui-interact glass-panel p-3 rounded-full hover:bg-white/10 transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
          </svg>
        </button>
      </div>
    </header>

    <footer class="flex justify-between items-end">
      <div class="space-y-4">
        <div id="status-panel" class="glass-panel p-4 rounded-2xl w-48 flex items-center gap-4 border-l-2 border-l-cyan-500 relative overflow-hidden">
          <div id="vision-dot" class="w-2 h-2 rounded-full bg-red-600"></div>
          <div>
            <div class="text-[8px] tracking-widest text-white/40 uppercase mb-1">Hand Tracking</div>
            <div id="gesture-name" class="text-xs font-medium text-cyan-400">等待输入...</div>
          </div>
          <div id="ok-bar" class="ok-progress"></div>
        </div>

        <div id="particle-panel" class="glass-panel p-4 rounded-2xl w-72 border-l-2 border-l-yellow-500 ui-interact pointer-events-auto">
          <div class="text-[8px] tracking-widest text-white/40 uppercase mb-3">Particle Controls</div>

          <div class="space-y-3">
            <div>
              <div class="flex justify-between text-[10px] text-white/60 mb-1">
                <span>粒子数量</span><span id="ui-count-val" class="text-cyan-300">200000</span>
              </div>
              <input id="count-range" type="range" min="20000" max="350000" step="10000" value="200000" oninput="setParticleCount(this.value)">
            </div>

            <div>
              <div class="flex justify-between text-[10px] text-white/60 mb-1">
                <span>粒子大小</span><span id="ui-size-val" class="text-cyan-300">1.00</span>
              </div>
              <input id="size-range" type="range" min="0.4" max="3.0" step="0.01" value="1.0" oninput="setParticleSizeMultiplier(this.value)">
            </div>

            <div>
              <div class="flex justify-between text-[10px] text-white/60 mb-1">
                <span>粒子的亮度</span><span id="ui-bright-val" class="text-cyan-300">0.80</span>
              </div>
              <input id="bright-range" type="range" min="0.05" max="1.0" step="0.01" value="0.8" oninput="setParticleBrightness(this.value)">
            </div>

            <div>
              <div class="flex justify-between text-[10px] text-white/60 mb-1">
                <span>粒子的颜色（饱和度）</span><span id="ui-sat-val" class="text-cyan-300">1.00</span>
              </div>
              <input id="sat-range" type="range" min="0.0" max="1.6" step="0.01" value="1.0" oninput="setParticleSaturation(this.value)">
            </div>

            <div>
              <div class="flex justify-between text-[10px] text-white/60 mb-1">
                <span>粒子色相</span><span id="ui-hue-val" class="text-cyan-300">0°</span>
              </div>
              <input id="hue-range" type="range" min="-180" max="180" step="1" value="0" oninput="setParticleHueShift(this.value)">
            </div>
          </div>
        </div>
      </div>

      <div class="text-right flex flex-col items-end">
        <div class="text-[8px] text-white/20 tracking-[0.3em] uppercase mb-1">Current Theme</div>
        <div id="asset-name" class="text-sm font-light tracking-[0.2em] text-white/80">伊阙星云待机模式</div>
      </div>
    </footer>
  </div>

  <div id="sidebar" class="fixed left-0 top-0 h-full w-80 glass-panel border-r border-white/10 z-50 -translate-x-full flex flex-col">
    <div class="p-10 flex flex-col h-full">
      <div class="flex justify-between items-center mb-10">
        <span class="text-xs tracking-[0.4em] text-white/60 uppercase">Archives / 龙门档案库</span>
        <button onclick="toggleSidebar(false)" class="ui-interact text-[10px] text-cyan-400 uppercase">Close</button>
      </div>
      <div id="model-list" class="ui-interact flex-1 overflow-y-auto space-y-3 pr-2"></div>
      <div class="mt-8 ui-interact">
        <label class="block p-5 border border-dashed border-white/20 rounded-2xl text-center cursor-pointer hover:border-cyan-400 transition-all group">
          <span class="text-[9px] text-white/40 group-hover:text-cyan-400 tracking-widest uppercase">+ 导入 OBJ 文件（石窟/造像重构）</span>
          <input type="file" multiple accept=".obj" class="hidden" onchange="handleFileUpload(event)">
        </label>
      </div>
    </div>
  </div>

  <button id="sidebar-open-btn" onclick="toggleSidebar(true)" class="ui-interact fixed left-6 top-1/2 -translate-y-1/2 z-40 p-5 rounded-full group">
    <div class="flex flex-col gap-2">
      <div class="w-1.5 h-1.5 rounded-full bg-white/20 group-hover:bg-cyan-400"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-white/20 group-hover:bg-cyan-400"></div>
      <div class="w-1.5 h-1.5 rounded-full bg-white/20 group-hover:bg-cyan-400"></div>
    </div>
  </button>

  <div id="info-panel" class="fixed right-12 top-1/2 -translate-y-1/2 w-96 glass-panel p-10 rounded-[2.5rem] opacity-0 transition-all duration-700 translate-x-12 z-30">
    <div class="text-[8px] text-yellow-500 tracking-[0.5em] mb-6 uppercase">Heritage Record</div>
    <h3 id="panel-title" class="text-2xl font-light mb-6 border-b border-white/10 pb-6 tracking-wide">伊水之畔</h3>
    <p id="panel-desc" class="text-xs leading-relaxed text-white/60 font-light text-justify italic">系统处于静默待机状态：以粒子之“尘”聚合石刻之“形”，模拟数字化重构的生成与呼吸。</p>
  </div>

  <div id="camera-panel" class="fixed bottom-2 right-12 w-96 h-60 glass-panel rounded-3xl overflow-hidden z-40">
    <video id="input_video" class="absolute inset-0 w-full h-full object-cover opacity-30 grayscale" playsinline></video>
    <canvas id="output_canvas" class="absolute inset-0 w-full h-full"></canvas>

    <svg class="circular-progress" viewBox="0 0 36 36">
      <circle class="bg-circle" cx="18" cy="18" r="16"></circle>
      <circle id="ok-circle" class="fg-circle" cx="18" cy="18" r="16"></circle>
    </svg>

    <div id="loading-overlay" class="absolute inset-0 flex items-center justify-center bg-black/40">
      <div class="custom-loader"></div>
    </div>

    <button id="camera-hide-btn"
      onclick="hideCameraPanel()"
      class="ui-interact absolute top-2 right-2 z-50 glass-panel px-3 py-1.5 rounded-full hover:bg-white/10 transition-all text-[9px] tracking-widest uppercase text-white/70">
      隐藏
    </button>
  </div>

  <button id="camera-badge"
    onclick="showCameraPanel()"
    class="ui-interact fixed bottom-12 right-12 z-40 hidden glass-panel px-4 py-2 rounded-full hover:bg-white/10 transition-all text-[9px] tracking-widest uppercase text-white/70">
    摄像头
  </button>

  <script>
    const config = { count: 200000, colors: { dark: 0x000406 }, apiKey: "" };

    let scene, camera, renderer, composer, points;

    let targetPositions = new Float32Array(config.count * 3);
    let targetColors = new Float32Array(config.count * 3);
    let targetSizes = new Float32Array(config.count);

    let baseColors = new Float32Array(config.count * 3);
    let baseAlpha = 0.8;
    let hueShift = 0;

    let currentRotationY = 0;
    let lerpScale = 1.0;
    let targetScale = 1.0;
    let isDragging = false;
    let lastMouseX = 0;

    let models = [];
    let activeModelIndex = -1;

    let okGestureStartTime = null;

    let basePinchDist = null;
    let baseScale = 1.0;

    let sizeMultiplier = 1.0;
    let saturation = 1.0;

    let autoCruiseTimer = null;
    let autoCruiseIndex = 0;

    let cameraPanelVisible = true;
    let kioskMode = false;

    const longmenThemes = [
      { name: "奉先寺·卢舍那大佛", desc: "北风拂伊水，奉先寺中卢舍那大佛含笑不语。粒子重组为面相与衣褶的流线，模拟扫描点云在时光中凝结。", palette: { base: [0.08, 0.85, 0.95], gold: [1.0, 0.82, 0.25] }, mode: "sphere" },
      { name: "古阳洞·北魏造像", desc: "古阳洞刻线峻拔，北魏风骨在刀痕里起伏。粒子更偏冷青与灰金，像拓片的呼吸与石质的纹理。", palette: { base: [0.05, 0.45, 0.75], gold: [0.85, 0.7, 0.25] }, mode: "helix" },
      { name: "宾阳三洞·礼佛长卷", desc: "宾阳洞群如长卷展开：帝后供养、礼佛行列、衣纹飘带。粒子在环形廊道中巡游，隐约呈现队列的节奏。", palette: { base: [0.12, 0.65, 0.55], gold: [0.95, 0.86, 0.35] }, mode: "ring" },
      { name: "伊阙星云·待机", desc: "伊阙两山夹峙，水声穿过千龛万像。系统以“星云”模拟数字遗产的无尽缓存：一切形与名，都等待被唤醒。", palette: { base: [0.0, 0.4, 0.3], gold: [0.6, 0.5, 0.1] }, mode: "nebula" }
    ];

    function clamp01(v) { return Math.max(0, Math.min(1, v)); }

    function rgbToHsv(r, g, b) {
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      const d = max - min;
      let h = 0;
      const s = max === 0 ? 0 : d / max;
      const v = max;

      if (d !== 0) {
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)); break;
          case g: h = ((b - r) / d + 2); break;
          default: h = ((r - g) / d + 4); break;
        }
        h /= 6;
      }
      return { h, s, v };
    }

    function hsvToRgb(h, s, v) {
      const i = Math.floor(h * 6);
      const f = h * 6 - i;
      const p = v * (1 - s);
      const q = v * (1 - f * s);
      const t = v * (1 - (1 - f) * s);

      switch (i % 6) {
        case 0: return { r: v, g: t, b: p };
        case 1: return { r: q, g: v, b: p };
        case 2: return { r: p, g: v, b: t };
        case 3: return { r: p, g: q, b: v };
        case 4: return { r: t, g: p, b: v };
        default: return { r: v, g: p, b: q };
      }
    }

    function applyColorAdjustments() {
      const hShift = hueShift / 360;
      for (let i = 0; i < config.count; i++) {
        const i3 = i * 3;
        const r = baseColors[i3], g = baseColors[i3 + 1], b = baseColors[i3 + 2];

        const hsv = rgbToHsv(r, g, b);
        let h = hsv.h + hShift;
        h = ((h % 1) + 1) % 1;

        const shifted = hsvToRgb(h, hsv.s, hsv.v);

        const l = 0.2126 * shifted.r + 0.7152 * shifted.g + 0.0722 * shifted.b;
        targetColors[i3] = clamp01(l + (shifted.r - l) * saturation);
        targetColors[i3 + 1] = clamp01(l + (shifted.g - l) * saturation);
        targetColors[i3 + 2] = clamp01(l + (shifted.b - l) * saturation);
      }
    }

    function makePointsMaterial() {
      return new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uRotation: { value: 0 },
          uScale: { value: 1.0 },
          uAlpha: { value: baseAlpha },
          uSizeMul: { value: sizeMultiplier }
        },
        vertexShader: `
          attribute float size;
          attribute vec3 color;
          varying vec3 vColor;
          uniform float uTime;
          uniform float uRotation;
          uniform float uScale;
          uniform float uSizeMul;
          void main() {
            vColor = color;
            vec3 pos = position * uScale;
            float s = sin(uRotation);
            float c = cos(uRotation);
            mat2 rot = mat2(c, -s, s, c);
            pos.xz = rot * pos.xz;
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = (size * uSizeMul) * (2000.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          uniform float uAlpha;
          void main() {
            float d = distance(gl_PointCoord, vec2(0.5));
            if (d > 0.5) discard;
            float a = (1.0 - d * 2.0) * uAlpha;
            gl_FragColor = vec4(vColor, a);
          }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
    }

    function buildParticleSystem() {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(config.count * 3);
      const colors = new Float32Array(config.count * 3);
      const sizes = new Float32Array(config.count);

      for (let i = 0; i < config.count; i++) {
        const i3 = i * 3;
        positions[i3] = (Math.random() - 0.5) * 800;
        positions[i3 + 1] = (Math.random() - 0.5) * 800;
        positions[i3 + 2] = (Math.random() - 0.5) * 800;

        targetPositions[i3] = positions[i3];
        targetPositions[i3 + 1] = positions[i3 + 1];
        targetPositions[i3 + 2] = positions[i3 + 2];

        colors[i3] = 0.1; colors[i3 + 1] = 0.4; colors[i3 + 2] = 0.6;
        targetColors[i3] = colors[i3]; targetColors[i3 + 1] = colors[i3 + 1]; targetColors[i3 + 2] = colors[i3 + 2];

        sizes[i] = Math.random() < 0.05 ? 0.35 : 0.08;
        targetSizes[i] = sizes[i];

        baseColors[i3] = targetColors[i3];
        baseColors[i3 + 1] = targetColors[i3 + 1];
        baseColors[i3 + 2] = targetColors[i3 + 2];
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

      points = new THREE.Points(geometry, makePointsMaterial());
      scene.add(points);
    }

    function initApp() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(config.colors.dark);

      camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.z = 180;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      composer = new THREE.EffectComposer(renderer);
      composer.addPass(new THREE.RenderPass(scene, camera));
      composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.5, 0.8));

      buildParticleSystem();

      window.addEventListener('resize', onResize);

      window.addEventListener('mousedown', (e) => {
        if (e.button === 0) { isDragging = true; lastMouseX = e.clientX; }
      });
      window.addEventListener('mousemove', (e) => {
        if (isDragging) {
          currentRotationY += (e.clientX - lastMouseX) * 0.005;
          lastMouseX = e.clientX;
        }
      });
      window.addEventListener('mouseup', () => isDragging = false);

      window.addEventListener('wheel', (e) => {
        targetScale -= e.deltaY * 0.001;
        targetScale = Math.max(0.3, Math.min(3.0, targetScale));
      });

      window.addEventListener('dblclick', () => {
        if (models.length > 0) reconstructModel((activeModelIndex + 1) % models.length);
        else setThemeMode((autoCruiseIndex + 1) % longmenThemes.length);
      });

      document.getElementById('ui-count-val').innerText = String(config.count);
      setParticleSizeMultiplier(document.getElementById('size-range').value);
      setParticleBrightness(document.getElementById('bright-range').value);
      setParticleSaturation(document.getElementById('sat-range').value);
      setParticleHueShift(document.getElementById('hue-range').value);

      animate();
      setThemeMode(3);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      if (!isDragging) currentRotationY += 0.0012;
      lerpScale += (targetScale - lerpScale) * 0.1;

      points.material.uniforms.uTime.value = performance.now() * 0.001;
      points.material.uniforms.uRotation.value = currentRotationY;
      points.material.uniforms.uScale.value = lerpScale;

      const pos = points.geometry.attributes.position.array;
      const col = points.geometry.attributes.color.array;
      const siz = points.geometry.attributes.size.array;

      for (let i = 0; i < config.count; i++) {
        const i3 = i * 3;
        pos[i3] += (targetPositions[i3] - pos[i3]) * 0.06;
        pos[i3 + 1] += (targetPositions[i3 + 1] - pos[i3 + 1]) * 0.06;
        pos[i3 + 2] += (targetPositions[i3 + 2] - pos[i3 + 2]) * 0.06;

        col[i3] += (targetColors[i3] - col[i3]) * 0.04;
        col[i3 + 1] += (targetColors[i3 + 1] - col[i3 + 1]) * 0.04;
        col[i3 + 2] += (targetColors[i3 + 2] - col[i3 + 2]) * 0.04;

        siz[i] += (targetSizes[i] - siz[i]) * 0.06;
      }

      points.geometry.attributes.position.needsUpdate = true;
      points.geometry.attributes.color.needsUpdate = true;
      points.geometry.attributes.size.needsUpdate = true;

      composer.render();
    }

    window.setParticleCount = (v) => {
      const newCount = parseInt(v, 10);
      document.getElementById('ui-count-val').innerText = String(newCount);
      if (newCount === config.count) return;

      config.count = newCount;

      targetPositions = new Float32Array(config.count * 3);
      targetColors = new Float32Array(config.count * 3);
      targetSizes = new Float32Array(config.count);
      baseColors = new Float32Array(config.count * 3);

      if (points) {
        scene.remove(points);
        points.geometry.dispose();
        points.material.dispose();
      }

      buildParticleSystem();

      points.material.uniforms.uRotation.value = currentRotationY;
      points.material.uniforms.uScale.value = lerpScale;
      points.material.uniforms.uAlpha.value = baseAlpha;
      points.material.uniforms.uSizeMul.value = sizeMultiplier;

      if (models.length > 0 && activeModelIndex >= 0) reconstructModel(activeModelIndex);
      else setThemeMode(autoCruiseIndex);
    };

    window.setParticleSizeMultiplier = (v) => {
      sizeMultiplier = parseFloat(v);
      points.material.uniforms.uSizeMul.value = sizeMultiplier;
      document.getElementById('ui-size-val').innerText = sizeMultiplier.toFixed(2);
    };

    window.setParticleBrightness = (v) => {
      baseAlpha = parseFloat(v);
      points.material.uniforms.uAlpha.value = baseAlpha;
      document.getElementById('ui-bright-val').innerText = baseAlpha.toFixed(2);
    };

    window.setParticleSaturation = (v) => {
      saturation = parseFloat(v);
      document.getElementById('ui-sat-val').innerText = saturation.toFixed(2);
      applyColorAdjustments();
    };

    window.setParticleHueShift = (v) => {
      hueShift = parseFloat(v);
      document.getElementById('ui-hue-val').innerText = `${Math.round(hueShift)}°`;
      applyColorAdjustments();
    };

    function setThemeMode(themeIndex) {
      autoCruiseIndex = themeIndex;
      const theme = longmenThemes[themeIndex];

      document.getElementById('asset-name').innerText = theme.name;
      activeModelIndex = -1;
      targetScale = 1.0;

      const palBase = theme.palette.base;
      const palGold = theme.palette.gold;

      for (let i = 0; i < config.count; i++) {
        const i3 = i * 3;

        if (theme.mode === "nebula") {
          const r = 50 + Math.random() * 100;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos((Math.random() * 2) - 1);
          targetPositions[i3] = r * Math.sin(phi) * Math.cos(theta);
          targetPositions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
          targetPositions[i3 + 2] = r * Math.cos(phi);
        } else if (theme.mode === "ring") {
          const r = 90 + Math.random() * 40;
          const theta = Math.random() * Math.PI * 2;
          targetPositions[i3] = r * Math.cos(theta);
          targetPositions[i3 + 2] = r * Math.sin(theta);
          targetPositions[i3 + 1] = (Math.random() - 0.5) * 140;
        } else if (theme.mode === "helix") {
          const t = (i / config.count) * Math.PI * 10;
          const r = 60 + (Math.random() - 0.5) * 10;
          targetPositions[i3] = Math.cos(t) * r;
          targetPositions[i3 + 2] = Math.sin(t) * r;
          targetPositions[i3 + 1] = (i / config.count - 0.5) * 220 + (Math.random() - 0.5) * 10;
        } else {
          const r = 70 + Math.random() * 35;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos((Math.random() * 2) - 1);
          targetPositions[i3] = r * Math.sin(phi) * Math.cos(theta);
          targetPositions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
          targetPositions[i3 + 2] = r * Math.cos(phi);
        }

        const isGold = Math.random() > 0.86;
        const br = isGold ? palGold[0] : palBase[0];
        const bg = isGold ? palGold[1] : palBase[1];
        const bb = isGold ? palGold[2] : palBase[2];

        baseColors[i3] = br;
        baseColors[i3 + 1] = bg;
        baseColors[i3 + 2] = bb;

        targetSizes[i] = Math.random() < 0.05 ? 0.35 : 0.08;
      }

      applyColorAdjustments();

      const panel = document.getElementById('info-panel');
      document.getElementById('panel-title').innerText = theme.name;
      document.getElementById('panel-desc').innerText = theme.desc;
      panel.classList.remove('opacity-0', 'translate-x-12');
      panel.style.display = '';
    }

    function reconstructModel(index) {
      const modelData = models[index];
      activeModelIndex = index;
      document.getElementById('asset-name').innerText = modelData.name;

      const samplerPoints = [];
      modelData.group.traverse(child => {
        if (child.isMesh) {
          const geom = child.geometry.isBufferGeometry ? child.geometry : new THREE.BufferGeometry().fromGeometry(child.geometry);
          const posAttr = geom.attributes.position;
          for (let i = 0; i < posAttr.count; i++) {
            samplerPoints.push(new THREE.Vector3().fromBufferAttribute(posAttr, i).applyMatrix4(child.matrixWorld));
          }
        }
      });

      const box = new THREE.Box3().setFromObject(modelData.group);
      const center = box.getCenter(new THREE.Vector3());
      const scale = 55 / Math.max(box.getSize(new THREE.Vector3()).x, box.getSize(new THREE.Vector3()).y, box.getSize(new THREE.Vector3()).z);
      const bodyCount = Math.floor(config.count * 0.9);

      for (let i = 0; i < config.count; i++) {
        const i3 = i * 3;
        if (i < bodyCount) {
          const p = samplerPoints[Math.floor(Math.random() * samplerPoints.length)];
          const jitter = 0.02;
          targetPositions[i3] = (p.x - center.x) * scale + (Math.random() - 0.5) * jitter;
          targetPositions[i3 + 1] = (p.y - center.y) * scale + (Math.random() - 0.5) * jitter;
          targetPositions[i3 + 2] = (p.z - center.z) * scale + (Math.random() - 0.5) * jitter;

          const isGold = Math.random() > 0.78;
          const br = isGold ? 1.0 : 0.06;
          const bg = isGold ? 0.86 : 0.92;
          const bb = isGold ? 0.25 : 0.78;

          baseColors[i3] = br; baseColors[i3 + 1] = bg; baseColors[i3 + 2] = bb;

          const rand = Math.random();
          if (rand > 0.98) targetSizes[i] = 0.3;
          else if (rand > 0.9) targetSizes[i] = 0.15;
          else targetSizes[i] = 0.045;
        } else {
          const r = 100 + Math.random() * 150;
          const theta = Math.random() * Math.PI * 2;
          targetPositions[i3] = r * Math.cos(theta);
          targetPositions[i3 + 1] = (Math.random() - 0.5) * 300;
          targetPositions[i3 + 2] = r * Math.sin(theta);

          const br = 0.05, bg = 0.2, bb = 0.3;
          baseColors[i3] = br; baseColors[i3 + 1] = bg; baseColors[i3 + 2] = bb;

          targetSizes[i] = 0.06;
        }
      }

      applyColorAdjustments();

      showInfo(modelData.name);
      toggleSidebar(false);
    }

    async function showInfo(name) {
      const panel = document.getElementById('info-panel');
      document.getElementById('panel-title').innerText = name;
      panel.classList.remove('opacity-0', 'translate-x-12');
      panel.style.display = '';

      try {
        const prompt = `以博学且富有诗意的语气，介绍洛阳龙门石窟相关主题：${name}。要求：围绕龙门石窟的历史、造像艺术、洞窟与碑刻/题记、伊水与两山（香山/龙门山）的地理意象，以及数字化重构意义。控制在150字内。`;
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${config.apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        const data = await response.json();
        document.getElementById('panel-desc').innerText = data?.candidates?.[0]?.content?.parts?.[0]?.text
          || "伊水穿峡，万像如林。数字化重构让风化的线条重得呼吸，让碑刻与题记在光影里再度可读。";
      } catch (e) {
        document.getElementById('panel-desc').innerText = "伊水穿峡，万龛万像。以粒子点云重组石刻之形，令风化的纹理在数字光场里再度醒来。";
      }
    }

    window.toggleAutoCruise = () => {
      const btn = document.getElementById('auto-btn');
      const running = !!autoCruiseTimer;

      if (running) {
        clearInterval(autoCruiseTimer);
        autoCruiseTimer = null;
        btn.classList.remove('bg-white/10');
        btn.innerText = "自动巡航";
        return;
      }

      btn.classList.add('bg-white/10');
      btn.innerText = "巡航中…";

      autoCruiseTimer = setInterval(() => {
        if (models.length > 0) {
          reconstructModel((activeModelIndex + 1) % models.length);
        } else {
          setThemeMode((autoCruiseIndex + 1) % longmenThemes.length);
        }
      }, 15000);
    };

    window.toggleSidebar = (show) => document.getElementById('sidebar').style.transform = show ? 'translateX(0)' : 'translateX(-100%)';

    window.toggleFullScreen = () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    };

    window.handleFileUpload = (e) => {
      const loader = new THREE.OBJLoader();
      Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          models.push({
            id: Date.now(),
            name: file.name.replace('.obj', ''),
            group: loader.parse(ev.target.result)
          });
          renderModelList();
        };
        reader.readAsText(file);
      });
      toggleSidebar(true);
    };

    function renderModelList() {
      const list = document.getElementById('model-list');
      list.innerHTML = '';
      models.forEach((m, i) => {
        const div = document.createElement('div');
        div.className = "p-4 bg-white/5 border border-white/5 rounded-2xl cursor-pointer hover:bg-cyan-500/10 transition-all flex justify-between group";
        div.innerHTML = `<span class="text-[10px] text-white/50 group-hover:text-white uppercase">${m.name}</span>`;
        div.onclick = () => reconstructModel(i);
        list.appendChild(div);
      });
    }

    window.hideCameraPanel = () => {
      cameraPanelVisible = false;
      const panel = document.getElementById('camera-panel');
      const badge = document.getElementById('camera-badge');
      if (panel) panel.classList.add('hidden');
      if (badge) badge.classList.remove('hidden');
    };

    window.showCameraPanel = () => {
      cameraPanelVisible = true;
      const panel = document.getElementById('camera-panel');
      const badge = document.getElementById('camera-badge');
      if (panel) panel.classList.remove('hidden');
      if (badge) badge.classList.add('hidden');
    };

    // 统一的“沉浸模式 UI 状态应用”，用于按钮触发 & Esc 退出全屏时自动恢复
    function applyKioskModeUI(isOn) {
      const overlay = document.querySelector('.ui-overlay');
      const sidebar = document.getElementById('sidebar');
      const sidebarOpenBtn = document.getElementById('sidebar-open-btn');
      const infoPanel = document.getElementById('info-panel');
      const kioskBtn = document.getElementById('kiosk-btn');
      const cameraPanel = document.getElementById('camera-panel');
      const cameraBadge = document.getElementById('camera-badge');
      const particlePanel = document.getElementById('particle-panel');
      const statusPanel = document.getElementById('status-panel');

      if (isOn) {
        if (overlay) overlay.style.display = '';
        if (sidebar) sidebar.style.transform = 'translateX(-100%)';
        if (sidebarOpenBtn) sidebarOpenBtn.style.display = '';
        if (infoPanel) infoPanel.style.display = '';

        // 沉浸模式仅隐藏“粒子控制”和“状态面板”，其他保持不变
        if (particlePanel) particlePanel.style.display = 'none';
        if (statusPanel) statusPanel.style.display = 'none';

        // 摄像头保持原有显示逻辑
        if (cameraPanel) cameraPanel.style.display = '';
        if (cameraBadge) cameraBadge.style.display = '';
        if (cameraPanelVisible) {
          if (cameraPanel) cameraPanel.classList.remove('hidden');
          if (cameraBadge) cameraBadge.classList.add('hidden');
        } else {
          if (cameraPanel) cameraPanel.classList.add('hidden');
          if (cameraBadge) cameraBadge.classList.remove('hidden');
        }

        if (kioskBtn) kioskBtn.innerText = "退出沉浸";
      } else {
        if (overlay) overlay.style.display = '';
        if (sidebarOpenBtn) sidebarOpenBtn.style.display = '';
        if (infoPanel) infoPanel.style.display = '';

        if (particlePanel) particlePanel.style.display = '';
        if (statusPanel) statusPanel.style.display = '';

        // 摄像头：按之前隐藏状态恢复（面板/角标二选一）
        if (cameraPanel) cameraPanel.style.display = '';
        if (cameraBadge) cameraBadge.style.display = '';
        if (cameraPanelVisible) {
          if (cameraPanel) cameraPanel.classList.remove('hidden');
          if (cameraBadge) cameraBadge.classList.add('hidden');
        } else {
          if (cameraPanel) cameraPanel.classList.add('hidden');
          if (cameraBadge) cameraBadge.classList.remove('hidden');
        }

        if (kioskBtn) kioskBtn.innerText = "沉浸模式";
      }
    }

    window.toggleKioskMode = async () => {
      kioskMode = !kioskMode;

      if (kioskMode) {
        try {
          if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        } catch (e) {}
        applyKioskModeUI(true);
      } else {
        try {
          if (document.fullscreenElement) await document.exitFullscreen();
        } catch (e) {}
        applyKioskModeUI(false);
      }
    };

    // Esc / 系统手段退出全屏时：若处于沉浸模式，自动恢复 UI，避免状态不同步
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement && kioskMode) {
        kioskMode = false;
        applyKioskModeUI(false);
      }
    });

    function initVision() {
      const videoElement = document.getElementById('input_video');
      const canvasElement = document.getElementById('output_canvas');
      const canvasCtx = canvasElement.getContext('2d');

      const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
      });

      hands.onResults((results) => {
        document.getElementById('loading-overlay').classList.add('hidden');
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        const okBar = document.getElementById('ok-bar');
        const okCircle = document.getElementById('ok-circle');
        const visionDot = document.getElementById('vision-dot');
        const gestureLabel = document.getElementById('gesture-name');

        if (results.multiHandLandmarks?.length > 0) {
          visionDot.className = "w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_10px_#00ffcc]";
          const lm = results.multiHandLandmarks[0];

          drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, { color: '#00FFFF', lineWidth: 2 });
          drawLandmarks(canvasCtx, lm, { color: '#FFD700', lineWidth: 1, radius: 2 });

          const dist = (p1, p2) => Math.hypot(lm[p1].x - lm[p2].x, lm[p1].y - lm[p2].y);
          const palmSize = dist(0, 5);

          const fist =
            (lm[8].y > lm[6].y) &&
            (lm[12].y > lm[10].y) &&
            (lm[16].y > lm[14].y) &&
            (lm[20].y > lm[18].y);

          const openPalm =
            (lm[8].y < lm[6].y) &&
            (lm[12].y < lm[10].y) &&
            (lm[16].y < lm[14].y) &&
            (lm[20].y < lm[18].y) &&
            (Math.abs(lm[4].x - lm[2].x) > 0.06);

          const isFingersExtended = lm[12].y < lm[9].y && lm[16].y < lm[13].y;
          const pinchDist = dist(4, 8);

          if (isFingersExtended && pinchDist > palmSize * 0.8) {
            if (basePinchDist === null) {
              basePinchDist = pinchDist;
              baseScale = targetScale;
            }
            let scaleFactor = pinchDist / basePinchDist;
            targetScale = Math.max(0.3, Math.min(3.0, baseScale * scaleFactor));
            gestureLabel.innerText = "平滑缩放中...";
          } else {
            basePinchDist = null;

            if (fist) {
              targetScale = Math.max(0.3, targetScale - 0.03);
              gestureLabel.innerText = "合拢中...";
            } else if (openPalm) {
              targetScale = Math.min(3.0, targetScale + 0.03);
              gestureLabel.innerText = "散开中...";
            }
          }

          const isOK = dist(4, 8) < 0.06 && lm[12].y < lm[10].y;

          if (isOK) {
            gestureLabel.innerText = "即将切换主题...";
            if (!okGestureStartTime) okGestureStartTime = Date.now();
            const elapsed = Date.now() - okGestureStartTime;
            const progress = Math.min(100, (elapsed / 1500) * 100);

            okBar.style.width = progress + "%";
            okCircle.style.strokeDashoffset = 100 - progress;

            if (elapsed > 1500) {
              if (models.length > 0) reconstructModel((activeModelIndex + 1) % models.length);
              else setThemeMode((autoCruiseIndex + 1) % longmenThemes.length);
              okGestureStartTime = null;
            }
          } else {
            okGestureStartTime = null;
            okBar.style.width = "0%";
            okCircle.style.strokeDashoffset = 100;

            if (!basePinchDist && !fist && !openPalm) gestureLabel.innerText = "手势交互中";
          }

          currentRotationY += (lm[0].x - 0.5) * 0.1;

        } else {
          visionDot.className = "w-2 h-2 rounded-full bg-red-600";
          gestureLabel.innerText = "等待输入...";
          okBar.style.width = "0%";
          okCircle.style.strokeDashoffset = 100;
          okGestureStartTime = null;
          basePinchDist = null;
        }

        canvasCtx.restore();
      });

      const cameraPipe = new Camera(videoElement, {
        onFrame: async () => {
          canvasElement.width = videoElement.videoWidth;
          canvasElement.height = videoElement.videoHeight;
          await hands.send({ image: videoElement });
        },
        width: 320,
        height: 240
      });

      cameraPipe.start().catch(err => {
        console.error("Camera access error:", err);
        document.getElementById('gesture-name').innerText = "摄像头不可用";
      });
    }

    // ... existing code ...

    window.onload = () => { initApp(); initVision(); loadOBJFiles(); };

    async function loadOBJFiles() {
      const objFolder = './';
      const objFiles = [
        '力士.obj',
        '卢舍那大佛.obj',
        '最美观音.obj',
        '菩萨.obj',
        '阿难.obj'
      ];

      const loader = new THREE.OBJLoader();

      for (const fileName of objFiles) {
        try {
          const response = await fetch(`${objFolder}${fileName}`);
          if (!response.ok) {
            console.warn(`无法加载 ${fileName}: ${response.statusText}`);
            continue;
          }

          const text = await response.text();
          const group = loader.parse(text);

          models.push({
            id: Date.now() + Math.random(),
            name: fileName.replace('.obj', ''),
            group: group
          });

          console.log(`成功加载: ${fileName}`);
        } catch (error) {
          console.error(`加载失败 ${fileName}:`, error);
        }
      }

      if (models.length > 0) {
        renderModelList();
        reconstructModel(0);
      }
    }

// ... existing code ...

  </script>
